# ~/.config/helix/config.toml
# Theme: catppuccin_mocha (dark) to match the zsh/WezTerm dark default.
# For light macOS appearance switch to "gruvbox_light_hard". Helix has no native
# runtime light/dark follow — see ROADMAP for an optional hx wrapper.
theme = "catppuccin_mocha"

[editor]
line-number = "relative"          # relative numbers → fast j/k motions with counts
cursorline = true                 # highlight the line the cursor is on
color-modes = true                # colour the mode indicator by mode
true-color = true                 # WezTerm is truecolor; don't let $TERM downgrade
bufferline = "multiple"           # show a buffer tab bar only when >1 buffer is open
rulers = [80, 100]                # vertical guides at 80/100 cols
scrolloff = 8                     # keep 8 lines of context above/below the cursor
text-width = 80
default-line-ending = "lf"
insert-final-newline = true
completion-replace = true         # completion replaces the word, not just inserts
end-of-line-diagnostics = "hint"  # show the worst diagnostic at end of line

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false                    # show dotfiles in the file picker (Space-f)

[editor.statusline]
left = ["mode", "spinner", "version-control", "file-name", "read-only-indicator", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
display-messages = true           # show LSP progress/status in the statusline
display-inlay-hints = true        # inline type/param hints (when an LSP provides them)

[editor.inline-diagnostics]
cursor-line = "warning"           # show diagnostics inline on the cursor's line

[editor.indent-guides]
render = true
character = "▏"
skip-levels = 1

[editor.soft-wrap]
enable = false                    # off globally; enabled for prose in languages.toml

[editor.whitespace.render]
trailing = "all"                  # surface trailing whitespace…
nbsp = "all"                      # …and non-breaking spaces (a classic invisible bug)

[editor.whitespace.characters]
trailing = "·"
nbsp = "⍽"

[editor.search]
smart-case = true                 # case-insensitive unless the query has uppercase
wrap-around = true

[editor.auto-save]
after-delay.enable = true         # auto-save a few seconds after you stop typing
after-delay.timeout = 3000

# --- Keybindings (light touch; Helix defaults are good) ----------------------
[keys.normal]
C-s = ":write"                    # Ctrl-S to save
X = ["extend_line_up", "extend_to_line_bounds"]  # X extends selection a line up

[keys.insert]
C-s = ":write"

[keys.select]
X = ["extend_line_up", "extend_to_line_bounds"]
